services:
  megalinter:
    image: ghcr.io/oxsecurity/megalinter:v9.5.0
    profiles: [lint]
    security_opt:
      - label:disable
    environment:
      APPLY_FIXES: all
      WORKSPACE: /tmp/lint # Forces the tool out of CI isolation mode
      DEFAULT_WORKSPACE: /tmp/lint # Overrides internal script resets
    volumes:
      - ./:/tmp/lint

  web-app:
    build:
      context: apps/web-app
      dockerfile: build/Dockerfile
      target: ${BUILD_TARGET:-production}
    restart: always
    profiles: [web]
    ports:
      - 8080:8080
      - 9113:9113
    volumes:
      - ./apps/web-app/src:/app/src # dev only
      - ./apps/web-app/index.html:/app/index.html # dev only
      - ./apps/web-app/public/data:/usr/share/nginx/html/data
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-fs",
          "http://localhost:8080",
        ]
      interval: 3s
      timeout: 2s
      retries: 10

  prometheus-web-exporter:
    image: docker.io/nginx/nginx-prometheus-exporter:1.5.1
    profiles: [web]
    network_mode: service:web-app

  fluent-bit:
    image: docker.io/fluent/fluent-bit:5.0.7
    profiles: [web]
    user: "${UID}:${GID}" # mimic daemonset, so needs access to container runtime env logs
    volumes:
      - ./.docker-compose/fluent-bit/:/fluent-bit/fb/
      - /var/log/journal/:/var/log/journal/:ro
    ports:
      - 2020:2020
    environment:
      LOGS_PATH: /var/log/journal/
      DB_PATH: /fluent-bit/fb/fluent-bit.db
      REPO_NAME: sandbox
      METRICS_APP: prometheus
      WEB_APP: web-app
      WEB_CRON: web-app-cron
    command: ["-c", "/fluent-bit/fb/fluent-bit.yaml"]
    depends_on:
      loki:
        condition: service_healthy

  web-app-cron:
    image: curlimages/curl:8.20.0
    profiles: [web]
    user: "${UID}:${GID}"
    environment:
      PROMETHEUS_HOST: prometheus
      PROMETHEUS_PORT: 9090
      OUTPUT_FILE: /data/data.json
      QUERY: "go_memstats_other_sys_bytes"
    volumes:
      - ./apps/web-app/public/data:/data/
    entrypoint: ["sh", "-c"]
    command:
      - |
        while true; do
          curl -f -X POST "http://${PROMETHEUS_HOST}:${PROMETHEUS_PORT}/api/v1/query_range" \
          --data-urlencode "query=${QUERY}" \
          --data-urlencode "start=$(($(date +%s) - 60))" \
          --data-urlencode "end=$(date +%s)" \
          --data-urlencode "step=10s" \
          -o "${OUTPUT_FILE}"
          sleep 60
        done
    depends_on:
      web-app:
        condition: service_healthy
      prometheus:
        condition: service_healthy

  prometheus:
    image: docker.io/prom/prometheus:v3.11.3
    profiles: [web]
    volumes:
      - ./.docker-compose/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - 9090:9090
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-q",
          "--tries=1",
          "--spider",
          "http://localhost:9090/-/healthy",
        ]
      interval: 3s
      timeout: 2s
      retries: 10

  grafana:
    image: docker.io/grafana/grafana:12.4.1
    profiles: [web]
    volumes:
      - ./.docker-compose/grafana/datasource.yaml:/etc/grafana/provisioning/datasources/datasource.yaml
    ports:
      - 3000:3000
    healthcheck:
      test:
        ["CMD-SHELL", "curl -fs http://localhost:3000/api/health | grep -q ok"]
      interval: 3s
      timeout: 2s
      retries: 10

  loki:
    image: docker.io/grafana/loki:3.7.2
    profiles: [web]
    volumes:
      - ./.docker-compose/loki/loki-config.yaml:/etc/loki/local-config.yaml
    ports:
      - 3100:3100
    healthcheck:
      test:
        [
          "CMD",
          "/usr/bin/loki",
          "-health",
          "-health.url=http://localhost:3100/ready",
        ]
      interval: 3s
      timeout: 2s
      retries: 20

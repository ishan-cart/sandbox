---
EXTENDS: https://raw.githubusercontent.com/oxsecurity/megalinter/v9.5.0/.mega-linter.yml
CLEAR_REPORT_FOLDER: true
IGNORE_GITIGNORED_FILES: true
LOG_LEVEL: INFO

DISABLE_LINTERS:
  - TERRAFORM_TERRASCAN # Duplicate checks to TERRAFORM_CHECKOV
  - REPOSITORY_GRYPE
  - SPELL_CSPELL # too noisy
  - SPELL_LYCHEE # too noisy
  - REPOSITORY_TRIVY
  - PYTHON_PYLINT
  # Python — covered by PYTHON_RUFF (+ BLACK for format)
  - PYTHON_FLAKE8
  - PYTHON_ISORT
  - PYTHON_BANDIT # noisy; test false positives; security covered elsewhere
  # Supply chain — OSV_SCANNER kept for CVE signal
  - REPOSITORY_SYFT
  - REPOSITORY_TRIVY_SBOM
  # Security — false positives on in-cluster HTTP URLs
  - REPOSITORY_DEVSKIM
  # HTML — single index.html in web-app
  - HTML_DJLINT
  - HTML_HTMLHINT

DOCKERFILE_HADOLINT_FILE_NAMES_REGEX:
  - "Dockerfile"

REPOSITORY_KINGFISHER_ARGUMENTS: --exclude apps/web-app/src/assets/images/Untitled-2026-05-16-2229.svg

REPOSITORY_OSV_SCANNER_DISABLE_ERRORS: true

REPOSITORY_TRUFFLEHOG_COMMAND_REMOVE_ARGUMENTS: filesystem .
REPOSITORY_TRUFFLEHOG_ARGUMENTS: git file:///tmp/lint --exclude-paths=.trufflehogignore

REPOSITORY_CHECKOV_ARGUMENTS: |
  --skip-path "/gitops/services/haproxy-ingress/charts/kubernetes-ingress"
  --skip-path "/gitops/services/kube-prometheus-stack/charts/kube-prometheus-stack"
  --skip-path "/gitops/services/fluent-operator/charts/fluent-operator"
  --skip-check CKV2_AWS_62,CKV2_AWS_1,CKV_AWS_144,CKV_GHA_7,CKV_DOCKER_2

TERRAFORM_TFLINT_ARGUMENTS: --chdir=terraform/ --color

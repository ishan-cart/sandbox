APPLY_FIXES: all
ENABLE:
  - REPOSITORY
  - TERRAFORM
  - DOCKERFILE
  - YAML
  - BASH
  - TYPESCRIPT
  - ACTION
  - SPELL
  - COPYPASTE
DISABLE_LINTERS:
  - ACTION_ZIZMOR
FILTER_REGEX_EXCLUDE: '.*\.css$'
IGNORE_GITIGNORED_FILES: true

LOG_LEVEL: ERROR

TERRAFORM_TERRASCAN_ARGUMENTS: "-d ./terraform"

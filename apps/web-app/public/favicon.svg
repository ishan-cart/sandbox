<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <style>
    .initials {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-weight: 800;
      font-size: 20.5px;
    }
  </style>
  <!-- Clean background with rounded corners for high visibility -->
  <rect width="32" height="32" fill="#ffffff" rx="6"/>
  <!-- Perfectly centered, balanced initials 'IS' with crisp rendering -->
  <text x="16" y="23" class="initials" text-anchor="middle" letter-spacing="-0.5">
    <tspan fill="#0f172a">I</tspan><tspan fill="#2563eb">S</tspan>
  </text>
</svg>

name: 'Terraform'

on:
  workflow_call:
    inputs: &shared_inputs
      application:
        description: "The application name"
        required: true
        type: string
  workflow_dispatch:
    inputs: *shared_inputs

permissions:
  contents: read
  id-token: write

jobs:
  vars:
    name: Create github vars
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ./terraform/${{ inputs.application }}
    outputs:
      environment: ${{ steps.inputs.outputs.ENVIRONMENT }}
      region: ${{ steps.inputs.outputs.REGION  }}
      account_id: ${{ steps.inputs.outputs.ACCOUNT_ID }}
      tf_state_bucket: ${{ steps.inputs.outputs.TF_STATE_BUCKET }}
      tf_state_lock_table: ${{ steps.inputs.outputs.TF_STATE_LOCK_TABLE }}
      cloudflare_api_token: ${{ steps.inputs.outputs.CLOUDFLARE_API_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - id: inputs
        name: Load env vars
        run: tee -a "$GITHUB_OUTPUT" < dev.env

      - name: test
        run: ls
      
      - name: Create tfvars file
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.application }}-dev.auto.tfvars
          path: ./terraform/${{ inputs.application }}/dev.tfvars

  lint:
    name: Lint
    needs: [vars]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~1.14.0"

      - name: Terraform Format Check
        working-directory: ./terraform/${{ inputs.application }}
        run: terraform fmt -check -recursive -diff
  
  validate:
    runs-on: ubuntu-latest
    needs: [vars,lint]
    defaults:
      run:
        shell: bash
        working-directory: ./terraform/${{ inputs.application }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download tfvar files
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.application }}-dev.auto.tfvars
          path: ./terraform/${{ inputs.application }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v1
        with:
          terraform_version: "~1.14.0"
      
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: arn:aws:iam::537239034666:role/github_oidc_role
          aws-region: ${{ needs.vars.outputs.region }}

      - name: Terraform Init
        run: |
          terraform init \
          -backend-config=bucket=${{ needs.vars.outputs.tf_state_bucket }} \
          -backend-config=key=${{ inputs.application }}/terraform.tfstate \
          -backend-config=region=${{ needs.vars.outputs.region }} \
          -backend-config=dynamodb_table=${{ needs.vars.outputs.tf_state_lock_table }} \

      - name: Terraform Validate
        run: terraform validate -no-color

  plan:
    runs-on: ubuntu-latest
    needs: [vars,validate]
    defaults:
      run:
        shell: bash
        working-directory: ./terraform/${{ inputs.application }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download tfvar files
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.application }}-dev.auto.tfvars
          path: ./terraform/${{ inputs.application }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v1
        with:
          terraform_version: "~1.14.0"
      
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: arn:aws:iam::537239034666:role/github_oidc_role
          aws-region: ${{ needs.vars.outputs.region }}

      - name: AWS Secrets Manager GitHub Action
        if: ${{ needs.vars.outputs.CLOUDFLARE_API_TOKEN }}
        uses: aws-actions/aws-secretsmanager-get-secrets@v3.0.1
        with:
          parse-json-secrets: true
          secret-ids: |
            CLOUDFLARE_API_TOKEN,${{ needs.vars.outputs.CLOUDFLARE_API_TOKEN }}

      - name: Terraform Init
        run: |
          terraform init \
          -backend-config=bucket=${{ needs.vars.outputs.tf_state_bucket }} \
          -backend-config=key=${{ inputs.application }}/terraform.tfstate \
          -backend-config=region=${{ needs.vars.outputs.region }} \
          -backend-config=dynamodb_table=${{ needs.vars.outputs.tf_state_lock_table }}

      - name: Terraform Plan
        run: terraform plan -input=false -no-color

  apply:
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref_name == 'main'
    needs: [vars,plan]
    environment: production
    defaults:
      run:
        shell: bash
        working-directory: ./terraform/${{ inputs.application }}

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Download tfvar files
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.application }}-dev.auto.tfvars
          path: ./terraform/${{ inputs.application }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v1
        with:
          terraform_version: "~1.14.0"
      
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: arn:aws:iam::537239034666:role/github_oidc_role
          aws-region: ${{ needs.vars.outputs.region }}

      - name: AWS Secrets Manager GitHub Action
        if: ${{ needs.vars.outputs.CLOUDFLARE_API_TOKEN }}
        uses: aws-actions/aws-secretsmanager-get-secrets@v3.0.1
        with:
          parse-json-secrets: true
          secret-ids: |
            CLOUDFLARE_API_TOKEN,${{ needs.vars.outputs.CLOUDFLARE_API_TOKEN }}

      - name: Terraform Init
        run: |
          terraform init \
          -backend-config=bucket=${{ needs.vars.outputs.tf_state_bucket }} \
          -backend-config=key=${{ inputs.application }}/terraform.tfstate \
          -backend-config=region=${{ needs.vars.outputs.region }} \
          -backend-config=dynamodb_table=${{ needs.vars.outputs.tf_state_lock_table }}

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false


name: 'Terraform'

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  vars:
    name: Create github vars
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ./terraform
    outputs:
      environment: ${{ steps.inputs.outputs.ENVIRONMENT }}
      region: ${{ steps.inputs.outputs.REGION  }}
      account_id: ${{ steps.inputs.outputs.ACCOUNT_ID }}
      tf_state_bucket: ${{ steps.inputs.outputs.TF_STATE_BUCKET }}
      tf_state_key: ${{ steps.inputs.outputs.TF_STATE_KEY }}
      tf_state_lock_table: ${{ steps.inputs.outputs.TF_STATE_LOCK_TABLE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - id: inputs
        name: Load env vars
        run: tee -a "$GITHUB_OUTPUT" < dev.env
      
      - name: Create tfvars file
        uses: actions/upload-artifact@v7
        with:
          name: dev.auto.tfvars
          path: ./terraform/dev.tfvars

  lint:
        name: Lint
        needs: [vars]
        runs-on: ubuntu-latest
        steps:
          - name: Checkout
            uses: actions/checkout@v6
    
          - name: Setup Terraform
            uses: hashicorp/setup-terraform@v4
            with:
              terraform_version: "~1.14.0"
    
          - name: Terraform Format Check
            working-directory: ./terraform
            run: terraform fmt -check -recursive -diff
  
  validate:
    runs-on: ubuntu-latest
    needs: [vars,lint]
    defaults:
      run:
        shell: bash
        working-directory: ./terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download tfvar files
        uses: actions/download-artifact@v4
        with:
          name: dev.auto.tfvars
          path: ./terraform

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v1
        with:
          terraform_version: "~1.14.0"
      
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: arn:aws:iam::537239034666:role/github_oidc_role
          aws-region: ${{ needs.vars.outputs.region }}

      - name: Terraform Init
        run: |
          terraform init \
          -backend-config=bucket=${{ needs.vars.outputs.tf_state_bucket }} \
          -backend-config=key=${{ needs.vars.outputs.tf_state_key }} \
          -backend-config=region=${{ needs.vars.outputs.region }} \
          -backend-config=dynamodb_table=${{ needs.vars.outputs.tf_state_lock_table }}

      - name: Terraform Validate
        run: terraform validate -no-color

  plan:
    runs-on: ubuntu-latest
    needs: [vars,validate]
    defaults:
      run:
        shell: bash
        working-directory: ./terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download tfvar files
        uses: actions/download-artifact@v4
        with:
          name: dev.auto.tfvars
          path: ./terraform

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v1
      
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: arn:aws:iam::537239034666:role/github_oidc_role
          aws-region: ${{ needs.vars.outputs.region }}

      - name: Terraform Init
        run: |
          terraform init \
          -backend-config=bucket=${{ needs.vars.outputs.tf_state_bucket }} \
          -backend-config=key=${{ needs.vars.outputs.tf_state_key }} \
          -backend-config=region=${{ needs.vars.outputs.region }} \
          -backend-config=dynamodb_table=${{ needs.vars.outputs.tf_state_lock_table }}

      - name: Terraform Plan
        run: terraform plan -input=false -no-color

  apply:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [vars,plan]
    environment: production
    defaults:
      run:
        shell: bash
        working-directory: ./terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Download tfvar files
        uses: actions/download-artifact@v4
        with:
          name: dev.auto.tfvars
          path: ./terraform

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v1
      
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: arn:aws:iam::537239034666:role/github_oidc_role
          aws-region: ${{ needs.vars.outputs.region }}

      - name: Terraform Init
        run: |
          terraform init \
          -backend-config=bucket=${{ needs.vars.outputs.tf_state_bucket }} \
          -backend-config=key=${{ needs.vars.outputs.tf_state_key }} \
          -backend-config=region=${{ needs.vars.outputs.region }} \
          -backend-config=dynamodb_table=${{ needs.vars.outputs.tf_state_lock_table }}

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false


name: 'Main'

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  pathcheck:
    runs-on: ubuntu-latest
    outputs:
      terraform: ${{ steps.filter.outputs.terraform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Path Check
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            terraform:
              - terraform/infrastructure
              - terraform/kubernetes

  terraform:
    needs: [pathcheck]
    if: needs.pathcheck.outputs.terraform != '[]'
    strategy:
      matrix:
        application: ${{ fromJson(needs.pathcheck.outputs.terraform) }}
    uses: ./.github/workflows/terraform.yml
    with:
      tf_state_key: ${{ matrix.application }}/terraform.tfstate
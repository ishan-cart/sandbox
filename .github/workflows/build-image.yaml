name: "Build Image"

on:
  workflow_call:
    inputs:
      application:
        description: "The application name"
        required: true
        type: string
      push: &push_inputs
        description: push image to registry
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      application:
        description: "The application name"
        required: true
        type: choice
        options:
          - web-app
      push: *push_inputs

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repo
        uses: Actions/checkout@v6
        with:
          persist-credentials: false

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: arn:aws:iam::537239034666:role/github_oidc_role
          aws-region: "ap-southeast-2"

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure unique version tag
        working-directory: apps/${{ inputs.application }}
        id: version-check
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          APPLICATION: ${{ inputs.application }}
        run: |
          BUILD_VERSION="$(cat ./build/version)"
          if docker manifest inspect "${ECR_REGISTRY}/yeahboi/apps/${APPLICATION}:${BUILD_VERSION}" > /dev/null; then
            echo "::error::Tag '${BUILD_VERSION}' exists for this image"
            exit 1
          fi
          echo "BUILD_VERSION=${BUILD_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build
        working-directory: apps/${{ inputs.application }}
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          APPLICATION: ${{ inputs.application }}
          BUILD_VERSION: ${{ steps.version-check.outputs.BUILD_VERSION }}
        run: |
          docker build -t "${ECR_REGISTRY}/yeahboi/apps/${APPLICATION}:${BUILD_VERSION}" -f ./build/Dockerfile .

      - name: Push
        if: ${{ inputs.push }}
        working-directory: apps/${{ inputs.application }}
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          APPLICATION: ${{ inputs.application }}
          BUILD_VERSION: ${{ steps.version-check.outputs.BUILD_VERSION }}
        run: |
          BUILD_VERSION="$(cat ./build/version)"
          docker push "${ECR_REGISTRY}/yeahboi/apps/${APPLICATION}:${BUILD_VERSION}"

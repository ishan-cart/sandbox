name: "Main"

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions: read-all

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      web-app: ${{ steps.filter.outputs.web-app }}
      helm-libraries: ${{ steps.filter.outputs.helm-libraries }}
      terraform: ${{ steps.changes.outputs.terraform }}
      lambda: ${{ steps.changes.outputs.lambda }}
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: Actions/checkout@v6
        with:
          persist-credentials: false

      - name: Get Paths
        id: paths
        run: ./.github/scripts/get-paths.sh | tee -a "$GITHUB_OUTPUT"

      - name: Path Check
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: ${{ steps.paths.outputs.paths }}

      - name: Output Changes
        id: changes
        run: ./.github/scripts/output-changes.sh ${{ join(fromJson(steps.filter.outputs.changes), ' ') }} | tee -a "$GITHUB_OUTPUT"

  terraform:
    needs: [changes]
    if: needs.changes.outputs.terraform != '[]'
    permissions:
      contents: read
      id-token: write
    strategy:
      matrix:
        application: ${{ fromJson(needs.changes.outputs.terraform) }}
    uses: ./.github/workflows/terraform.yaml
    with:
      application: ${{ matrix.application }}

  test-lambda:
    needs: [changes]
    if: needs.changes.outputs.lambda != '[]'
    permissions:
      contents: read
    strategy:
      matrix:
        lambda: ${{ fromJson(needs.changes.outputs.lambda) }}
    uses: ./.github/workflows/test-lambda.yaml
    with:
      lambda: ${{ matrix.lambda }}

  build:
    needs: [changes, terraform]
    uses: ./.github/workflows/build-image.yaml
    if: always() && (needs.terraform.result == 'success' || needs.terraform.result == 'skipped') && needs.changes.outputs.web-app == 'true'
    permissions:
      contents: read
      id-token: write
    with:
      application: web-app
      push: ${{ github.ref_name == 'main' && github.event_name == 'push' }}

  helm-libraries:
    needs: [changes]
    if: ${{ needs.changes.outputs.helm-libraries == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: Actions/checkout@v6
        with:
          persist-credentials: false
          sparse-checkout: |
            helm-libraries

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: arn:aws:iam::537239034666:role/github_oidc_role
          aws-region: "ap-southeast-2"

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Package & Push
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          helm package helm-libraries/common-library/ -d helm-libraries/
          # Not require for OCI registries
          # helm repo index helm-libraries --url "${ECR_REGISTRY}/yeahboi/helm-libraries/"
          helm push helm-libraries/common-library-*.tgz "oci://${ECR_REGISTRY}/yeahboi/helm-libraries/"

service:
  parsers_file: /fluent-bit/etc/parsers.conf
  http_server: on
  http_listen: 0.0.0.0
  http_port: 2020
  hot_reload: on

parsers:
  - name: prometheus
    format: regex
    regex: ^time=(?<time>[^ ]+)\s+level=(?<level>[^ ]+)\s+source=(?<source>[^ ]+)\s+msg="(?<msg>[^"]+)"
    time_key: time
    time_format: "%Y-%m-%dT%H:%M:%S.%L%z"

  - name: trim
    format: regex
    regex: ^(?<MESSAGE>.*?)\s*$

pipeline:
  inputs:
    - name: systemd
      path: ${LOGS_PATH}
      db: ${DB_PATH}
      tag: journal.logs
      strip_underscores: true
      read_from_tail: true

  filters:
    - name: rewrite_tag
      match: journal.logs
      rule: $CONTAINER_NAME ^${REPO_NAME}_(?!fluent-bit|loki|grafana)([a-zA-Z0-9-]+)_[0-9]+ app.$1 false
    
    - name: record_modifier
      match: app.*
      allowlist_key: MESSAGE
    
    - name: parser
      match: app.*
      key_name: MESSAGE
      parser: trim

    - name: parser
      match: "app.${METRICS_APP}*"
      key_name: MESSAGE
      parser: prometheus

    - name: parser
      match: app.${WEB_APP}
      key_name: MESSAGE
      parser: nginx

    - name: record_modifier
      match: app.${WEB_CRON}
      allowlist_key: MESSAGE
  
    - name: lua
      match: app.*
      code: |
        function get_service(tag, timestamp, record)
          local new_record = record
          new_record["service_name"] = string.gsub(tag, "^app%.", "")
          return 2, timestamp, new_record
        end
      call: get_service

  outputs:
    - name: loki
      match: app.*
      host: loki
      port: 3100
      labels: agent=fluent-bit
      label_keys: $service_name
      line_format: json
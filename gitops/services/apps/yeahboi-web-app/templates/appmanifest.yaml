{{- include "common-library._deployment.tpl" . }}
---
{{- include "common-library._hpa.tpl" . }}
---
{{- include "common-library._service.tpl" . }}
---
{{- include "common-library._ingress.tpl" . }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: yeahboi-web-app-snapshot
spec:
  accessModes:
    - ReadWriteOnce
  volumeMode: Filesystem
  resources:
    requests:
      storage: 50Mi
  storageClassName: gp2
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: yeahboi-web-app-snapshot
spec:
  schedule: "*/5 * * * *" # Runs every 1 minutes
  concurrencyPolicy: Forbid 
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: curl
            image: curlimages/curl:latest
            imagePullPolicy: IfNotPresent
            env:
            - name: PROMETHEUS_HOST
              value: "prometheus-kube-prometheus-prometheus.monitoring.svc.cluster.local" # Use your cluster's Prometheus service name
            - name: PROMETHEUS_PORT
              value: "9090"
            - name: QUERY
              value: "sum(max by (cluster, namespace, pod, container)(node_namespace_pod_container:container_cpu_usage_seconds_total:sum_rate5m)) by (namespace)"
            - name: OUTPUT_FILE
              value: "/data/data.json"
            command: ["sh", "-c"]
            args:
            - |
              curl -f -X POST http://${PROMETHEUS_HOST}:${PROMETHEUS_PORT}/api/v1/query_range \
                --data-urlencode "query=${QUERY}" \
                --data-urlencode "start=$(($(date +%s) - 600))" \
                --data-urlencode "end=$(date +%s)" \
                --data-urlencode "step=1m" \
                -o "${OUTPUT_FILE}"
            volumeMounts:
            - mountPath: /data
              name: snapshots
          volumes:
          - name: snapshots
            persistentVolumeClaim:
              claimName: yeahboi-web-app-snapshot
          restartPolicy: OnFailure
